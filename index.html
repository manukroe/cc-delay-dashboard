<!DOCTYPE html>
<html lang="de">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Logistics · Delay Dashboard</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#0d0f14;color:#e2e8f0;min-height:100vh;}
  .dash{padding:24px 28px;max-width:1200px;margin:0 auto;}

  /* Header */
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
  .header-left h1{font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.03em;}
  .header-left .meta{font-size:11px;color:#444;margin-top:3px;}
  .live-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .live-label{font-size:10px;color:#4ade80;letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
  .header-right{font-size:11px;color:#444;text-align:right;line-height:1.6;}
  .header-right a{color:#378ADD;text-decoration:none;}

  /* Tabs */
  .tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;}
  .tab{padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#666;font-family:'DM Sans',sans-serif;transition:all .15s;}
  .tab:hover{color:#aaa;border-color:rgba(255,255,255,0.15);}

  /* Stat row */
  .stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:stretch;}
  .stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:13px 16px;min-width:130px;}
  .stat-card .slabel{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
  .stat-card .sval{font-size:26px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;letter-spacing:-.02em;line-height:1;}
  .stat-card .sdelta{font-size:11px;margin-top:5px;}
  .spark-card{flex:1;min-width:200px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:13px 16px;display:flex;flex-direction:column;justify-content:center;}
  .spark-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
  .spark-dates{display:flex;justify-content:space-between;font-size:9px;color:#333;margin-top:4px;}

  /* Team grid */
  .team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:9px;margin-bottom:18px;}
  .team-tile{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:12px 14px;cursor:pointer;transition:border-color .2s;}
  .tname{font-size:11px;font-weight:600;margin-bottom:6px;}
  .tval{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:#fff;letter-spacing:-.02em;margin-bottom:7px;}
  .tdelta{font-size:10px;}
  .tile-bottom{display:flex;justify-content:space-between;align-items:flex-end;}

  /* Two-col grid */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  @media(max-width:700px){.grid2{grid-template-columns:1fr;}}
  .panel{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 18px;}
  .panel-title{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:13px;}

  /* Bar rows */
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .bar-label{width:190px;font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
  .bar-track{flex:1;height:9px;background:rgba(255,255,255,0.05);border-radius:4px;}
  .bar-fill{height:9px;border-radius:4px;transition:width .5s ease;}
  .bar-val{width:28px;font-size:11px;color:#666;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace;}

  /* Initiatives */
  .init-item{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;}
  .badge{font-size:9px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;font-weight:500;}
  .badge-done{background:#4ade8022;color:#4ade80;border:1px solid #4ade8033;}
  .badge-progress{background:#60a5fa22;color:#60a5fa;border:1px solid #60a5fa33;}
  .badge-watch{background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf2433;}
  .init-text{font-size:12px;color:#ccc;line-height:1.4;}
  .init-impact{font-size:10px;color:#555;margin-top:2px;}

  /* Table */
  .table-wrap{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 18px;overflow-x:auto;margin-bottom:14px;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th{text-align:right;padding:5px 8px;color:#444;font-weight:500;white-space:nowrap;}
  th:first-child{text-align:left;padding-left:0;}
  td{text-align:right;padding:6px 8px;color:#555;font-family:'DM Mono',monospace;border-top:1px solid rgba(255,255,255,0.04);}
  td:first-child{text-align:left;padding-left:0;font-family:'DM Sans',sans-serif;font-weight:500;}
  tr.total-row td{border-top:1px solid rgba(255,255,255,0.1);color:#888;font-weight:600;}
  td.curr{color:#fff!important;font-weight:600;}
  th.curr{color:#aaa!important;}

  /* Chart */
  .chart-box{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
  .chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
  .chart-legend span{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;}
  .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

  /* Footer */
  .footer{font-size:10px;color:#2a2a2a;text-align:center;padding:16px 0 8px;}
</style>
</head>

// ── helpers ──────────────────────────────────────────────────────────────────
function teamTotal(week,team){
  if(team==='Customer')return CUST_ROWS.filter(r=>r.w===week).reduce((s,r)=>s+r.c,0);
  if(team==='Overall')return TEAMS.reduce((s,t)=>s+teamTotal(week,t),0);
  return FINN_ROWS.filter(r=>r.w===week&&r.t===team).reduce((s,r)=>s+r.c,0);
}
function topReasons(week,team,n=8){
  let rows;
  if(team==='Customer')rows=CUST_ROWS.filter(r=>r.w===week);
  else if(team==='Overall'){
    const map={};
    TEAMS.forEach(t=>FINN_ROWS.filter(r=>r.w===week&&r.t===t).forEach(r=>{map[r.r]=(map[r.r]||0)+r.c;}));
    rows=Object.entries(map).map(([r,c])=>({r,c}));
  } else rows=FINN_ROWS.filter(r=>r.w===week&&r.t===team);
  return [...rows].sort((a,b)=>b.c-a.c).slice(0,n);
}
function fmtDelta(cur,prev,invert=false){
  if(!prev)return '';
  const d=cur-prev,pct=Math.round(Math.abs(d)/prev*100);
  const good=invert?d>0:d<0;
  const col=d===0?'#555':good?'#4ade80':'#f87171';
  const arrow=d>0?'▲':d<0?'▼':'–';
  return `<span style="color:${col}">${arrow} ${pct}%</span>`;
}
function sparkSVG(vals,color,h=38,w=140){
  if(!vals||vals.length<2)return '';
  const max=Math.max(...vals,1);
  const pts=vals.map((v,i)=>{const x=(i/(vals.length-1))*w,y=h-(v/max)*h*.88;return `${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ');
  const dots=vals.map((v,i)=>{const x=(i/(vals.length-1))*w,y=h-(v/max)*h*.88,r=i===vals.length-1?4:2;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${color}"/>`;}).join('');
  return `<svg width="${w}" height="${h}" style="overflow:visible;display:block"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${dots}</svg>`;
}

function buildChart(tab,color){
  const ctx=document.getElementById('mainChart');
  if(!ctx)return;
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  const legend=document.getElementById('chartLegend');
  let datasets;
  if(tab==='Overall'){
    datasets=TEAMS.map(t=>({label:t,data:WEEKS.map(w=>teamTotal(w,t)),borderColor:TC[t],backgroundColor:TC[t],tension:.35,borderWidth:2,pointRadius:3,pointHoverRadius:6}));
    if(legend)legend.innerHTML=TEAMS.map(t=>`<span><span class="legend-dot" style="background:${TC[t]}"></span>${t}</span>`).join('');
  } else {
    const c=TC[tab]||'#378ADD';
    datasets=[{label:tab,data:WEEKS.map(w=>teamTotal(w,tab)),borderColor:c,backgroundColor:c,tension:.35,borderWidth:2,pointRadius:3,pointHoverRadius:6}];
    if(legend)legend.innerHTML=`<span><span class="legend-dot" style="background:${c}"></span>${tab}</span>`;
  }
  chartInstance=new Chart(ctx,{
    type:'line',
    data:{labels:WL,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
      scales:{

        y:{beginAtZero:true,ticks:{font:{size:11},color:'#555'},grid:{color:'rgba(255,255,255,0.04)'}}

    }
  });
}
