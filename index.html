<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Logistics · Delay Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0d0f14;color:#e2e8f0;min-height:100vh;}

/* Gate */
#gate{position:fixed;inset:0;background:#0d0f14;display:flex;align-items:center;justify-content:center;z-index:9999;}
.gate-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px 48px;text-align:center;min-width:320px;}
.gate-logo{font-size:13px;font-weight:600;color:#378ADD;letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;}
.gate-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:6px;}
.gate-sub{font-size:12px;color:#555;margin-bottom:28px;}
.gate-input{width:100%;padding:11px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-align:center;outline:none;transition:border-color .2s;}
.gate-input:focus{border-color:#378ADD;}
.gate-input.err{border-color:#f87171;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.gate-btn{margin-top:14px;width:100%;padding:11px;background:#378ADD;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;}
.gate-btn:hover{opacity:.85;}
.gate-err{font-size:11px;color:#f87171;margin-top:10px;min-height:16px;}

/* Layout */
#app{display:none;}
.dash{padding:24px 28px;max-width:1200px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
.live-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.live-label{font-size:10px;color:#4ade80;letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
.update-banner{font-size:10px;color:#fbbf24;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:6px;padding:3px 9px;margin-left:4px;}
h1{font-size:20px;font-weight:600;color:#fff;letter-spacing:-.03em;}
.meta{font-size:11px;color:#444;margin-top:3px;}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px;}
.kpi-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px;}
.kpi-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.kpi-val{font-size:26px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;letter-spacing:-.02em;line-height:1;}
.kpi-delta{font-size:11px;margin-top:5px;}
.kpi-sub{font-size:10px;color:#444;margin-top:3px;}
.kpi-card.success .kpi-val{color:#4ade80;}
.kpi-card.success{border-color:rgba(74,222,128,0.2);}
.kpi-card.warn .kpi-val{color:#f87171;}
.kpi-card.warn{border-color:rgba(248,113,113,0.2);}
.spark-kpi{flex:1;min-width:200px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:13px 16px;display:flex;flex-direction:column;justify-content:center;}

/* Tabs */
.tabs{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.tglabel{font-size:9px;color:#333;text-transform:uppercase;letter-spacing:.08em;margin:0 3px;}
.tdivider{width:1px;height:24px;background:rgba(255,255,255,0.08);margin:0 4px;}
.tab{padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#666;font-family:'DM Sans',sans-serif;transition:all .15s;}
.tab:hover{color:#aaa;}

/* Team tiles */
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:9px;margin-bottom:18px;}
.ttile{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:12px 14px;cursor:pointer;transition:border-color .2s;}
.tname{font-size:11px;font-weight:600;margin-bottom:6px;}
.tval{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:#fff;letter-spacing:-.02em;margin-bottom:7px;}
.tbot{display:flex;justify-content:space-between;align-items:flex-end;}

/* Charts */
.cbox{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
.ctitle{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.csub{font-size:10px;color:#2a2a2a;margin-bottom:10px;}
.cleg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.cleg span{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* Panels */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:700px){.g2{grid-template-columns:1fr;}}
.panel{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 18px;}
.ptitle{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:13px;}

/* Bars with tooltip */
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px;position:relative;}
.blabel{width:180px;font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;cursor:help;border-bottom:1px dashed rgba(255,255,255,0.15);}
.blabel:hover{color:#fff;}
.btrack{flex:1;height:9px;background:rgba(255,255,255,0.05);border-radius:4px;}
.bfill{height:9px;border-radius:4px;transition:width .5s ease;}
.bval{width:28px;font-size:11px;color:#666;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace;}
.reason-tooltip{display:none;position:absolute;left:0;top:100%;z-index:100;background:#1a1d26;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 12px;font-size:11px;color:#ccc;max-width:340px;min-width:240px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,0.6);}
.brow:hover .reason-tooltip{display:block;}
.reason-tooltip strong{color:#fff;display:block;margin-bottom:4px;}
.reason-tooltip .rt-meta{color:#555;font-size:10px;margin-top:4px;}

/* Initiatives */
.iitem{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;}
.badge{font-size:9px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;font-weight:500;}
.bd{background:#4ade8022;color:#4ade80;border:1px solid #4ade8033;}
.bp{background:#60a5fa22;color:#60a5fa;border:1px solid #60a5fa33;}
.bw{background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf2433;}
.itext{font-size:12px;color:#ccc;line-height:1.4;}
.iimp{font-size:10px;color:#555;margin-top:2px;}

/* Notice period chart */
.notice-legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
.notice-legend span{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;}

/* Slack status banner */
.slack-status{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.slack-pill{display:flex;align-items:center;gap:6px;font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid;}
.slack-ok{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.2);color:#4ade80;}
.slack-missing{background:rgba(251,191,36,0.06);border-color:rgba(251,191,36,0.2);color:#fbbf24;}

/* Table */
.twrap{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 18px;overflow-x:auto;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{text-align:right;padding:5px 6px;color:#444;font-weight:500;white-space:nowrap;}
th:first-child{text-align:left;padding-left:0;}
td{text-align:right;padding:6px 6px;color:#555;font-family:'DM Mono',monospace;border-top:1px solid rgba(255,255,255,0.04);}
td:first-child{text-align:left;padding-left:0;font-family:'DM Sans',sans-serif;font-weight:500;}
tr.trow td{border-top:1px solid rgba(255,255,255,0.1);color:#888;font-weight:600;}
.thm{color:#333!important;font-weight:400!important;}
.thw{color:#aaa!important;}
.thwc{color:#fff!important;font-weight:600!important;}
.thdiv{border-left:1px solid rgba(255,255,255,0.08)!important;}
.tdm{color:#2e2e2e!important;}
.tdw{color:#666!important;}
.tdwc{color:#fff!important;font-weight:600!important;}
.tddiv{border-left:1px solid rgba(255,255,255,0.06)!important;}
.footer{font-size:10px;color:#222;text-align:center;padding:16px 0 8px;}

</head>

function wt(w,t){
  if(t==='Customer')return CR.filter(r=>r.w===w).reduce((s,r)=>s+r.c,0);
  if(t==='Overall')return TEAMS.reduce((s,x)=>s+wt(w,x),0);
  return WR.filter(r=>r.w===w&&r.t===t).reduce((s,r)=>s+r.c,0);
}
function mt(mi,t){
  if(t==='Customer')return CUSTM[mi].reduce((a,b)=>a+b,0);
  if(t==='Overall')return TEAMS.reduce((s,x)=>s+mt(mi,x),0);
  return Object.values(MDATA[t]||{}).reduce((s,a)=>s+(a[mi]||0),0);
}
function at(i,t){return i<NM?mt(i,t):wt(WEEKS[i-NM],t);}
function topR(w,t,n=8){
  let rows;
  if(t==='Customer')rows=CR.filter(r=>r.w===w);
  else if(t==='Overall'){const m={};TEAMS.forEach(x=>WR.filter(r=>r.w===w&&r.t===x).forEach(r=>{m[r.r]=(m[r.r]||0)+r.c;}));rows=Object.entries(m).map(([r,c])=>({r,c}));}
  else rows=WR.filter(r=>r.w===w&&r.t===t);
  return [...rows].sort((a,b)=>b.c-a.c).slice(0,n);
}
function spk(vals,col,h=38,w=140){
  if(!vals||vals.length<2)return '';
  const mx=Math.max(...vals,1);
  const pts=vals.map((v,i)=>{const x=(i/(vals.length-1))*w,y=h-(v/mx)*h*.88;return `${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ');
  const dots=vals.map((v,i)=>{const x=(i/(vals.length-1))*w,y=h-(v/mx)*h*.88,r=i===vals.length-1?4:2;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${col}"/>`;}).join('');
  return `<svg width="${w}" height="${h}" style="overflow:visible;display:block"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>${dots}</svg>`;
}
function fd(cur,prv){
  if(!prv)return '';
  const d=cur-prv,p=Math.round(Math.abs(d)/prv*100),col=d===0?'#555':d<0?'#4ade80':'#f87171';
  return `<span style="color:${col}">${d>0?'▲':d<0?'▼':'–'} ${p}%</span>`;
}

    <strong>${r}</strong>
    ${tt.desc}
    <div class="rt-meta">ID: ${tt.id} · Team: ${tt.team} · Shift: ${tt.shift} · Ø Dauer: ${tt.avg}</div>
  </div>`:'';
  return `<div class="brow">
    <div class="blabel" title="${r}${tt?' (hover für Details)':''}">${r}</div>
    <div class="btrack"><div class="bfill" style="width:${Math.round(c/mxR*100)}%;background:${col}"></div></div>
    <div class="bval">${c}</div>
    ${tooltipHtml}
  </div>`;
}

const DIV_PLUGIN={id:'div',afterDraw(c){
  const ctx=c.ctx,x=c.scales.x,y=c.scales.y;
  const px=(x.getPixelForValue(NM-1)+x.getPixelForValue(NM))/2;
  ctx.save();ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px,y.top);ctx.lineTo(px,y.bottom);ctx.stroke();ctx.restore();
}};

let CM=null,RM=null,NM2=null,HSRC=null;
let activeTab='Overall';
// Use LAST_COMPLETE_W for comparisons (not the partial current week)
const LW=WEEKS[WEEKS.length-1]; // May 4 – shown but marked partial
const PW=LAST_COMPLETE_W;        // Apr 27 – last complete, used for display
const CMP_W=LAST_COMPLETE_W;     // Apr 27 – reference for WoW delta
const CMP_W_PREV=PREV_COMPLETE_W; // Apr 20 – comparison base for WoW delta

function buildMain(tab){
  const ctx=document.getElementById('mc');if(!ctx)return;
  if(CM){CM.destroy();CM=null;}
  const leg=document.getElementById('ml');leg.innerHTML='';
  const aidx=ALL.map((_,i)=>i);let ds;
  if(tab==='Overall'){
    ds=TEAMS.map(t=>({label:t,data:aidx.map(i=>at(i,t)),borderColor:TC[t],backgroundColor:TC[t],tension:.35,borderWidth:2,pointRadius:aidx.map(i=>i<NM?3:4),pointHoverRadius:7}));
    leg.innerHTML=TEAMS.map(t=>`<span><span class="ldot" style="background:${TC[t]}"></span>${t}</span>`).join('');
  } else {
    const col=TC[tab]||'#378ADD';
    ds=[{label:tab,data:aidx.map(i=>at(i,tab)),borderColor:col,backgroundColor:col,tension:.35,borderWidth:2.5,pointRadius:aidx.map(i=>i<NM?3:4),pointHoverRadius:7}];
    leg.innerHTML=`<span><span class="ldot" style="background:${col}"></span>${tab} Total</span>`;
  }
  CM=new Chart(ctx,{type:'line',data:{labels:ALL,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{afterBody:items=>{const i=items[0].dataIndex;return [`Total: ${at(i,tab)}`];}}}},
      scales:{x:{ticks:{font:{size:10},color:(c)=>c.index<NM?'#3a3a3a':'#666',maxRotation:35,autoSkip:false},grid:{color:'rgba(255,255,255,0.03)'}},y:{beginAtZero:true,ticks:{font:{size:10},color:'#555'},grid:{color:'rgba(255,255,255,0.04)'}}}
    },plugins:[DIV_PLUGIN]});
}

function buildReason(tab){
  const wrap=document.getElementById('rw');if(!wrap)return;
  if(tab==='Overall'||tab==='Customer'){wrap.style.display='none';return;}
  wrap.style.display='block';
  const ctx=document.getElementById('rc');if(!ctx)return;
  if(RM){RM.destroy();RM=null;}
  const pal=RP[tab]||RP.Infleeting,aidx=ALL.map((_,i)=>i);
  const rset=new Set();
  if(MDATA[tab])Object.keys(MDATA[tab]).forEach(r=>rset.add(r));
  WR.filter(r=>r.t===tab).forEach(r=>rset.add(r.r));
  const scored=[...rset].map(r=>{const lv=WR.filter(x=>x.t===tab&&x.w===LW&&x.r===r).reduce((s,x)=>s+x.c,0);return{r,lv};}).sort((a,b)=>b.lv-a.lv).slice(0,6);
  const leg=document.getElementById('rl');leg.innerHTML='';
  const ds=scored.map(({r},i)=>{
    const data=aidx.map(idx=>{if(idx<NM)return(MDATA[tab]?.[r]?.[idx])||0;return WR.filter(x=>x.t===tab&&x.w===WEEKS[idx-NM]&&x.r===r).reduce((s,x)=>s+x.c,0);});
    leg.innerHTML+=`<span><span class="ldot" style="background:${pal[i%pal.length]}"></span>${r}</span>`;
    return{label:r,data,borderColor:pal[i%pal.length],backgroundColor:pal[i%pal.length],tension:.35,borderWidth:2,pointRadius:aidx.map(j=>j<NM?3:4),pointHoverRadius:6};
  });
  RM=new Chart(document.getElementById('rc'),{type:'line',data:{labels:ALL,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
      scales:{x:{ticks:{font:{size:10},color:(c)=>c.index<NM?'#3a3a3a':'#666',maxRotation:35,autoSkip:false},grid:{color:'rgba(255,255,255,0.03)'}},y:{beginAtZero:true,ticks:{font:{size:10},color:'#555'},grid:{color:'rgba(255,255,255,0.04)'}}}
    },plugins:[DIV_PLUGIN]});
}

function buildNoticeChart(){
  const ctx=document.getElementById('nmc');if(!ctx)return;
  if(NM2){NM2.destroy();NM2=null;}
  const mLabels=NOTICE_MONTHLY.labels;
  const allLabels=[...mLabels,...WL];
  const lateData=[...NOTICE_MONTHLY.late,...NOTICE_WEEKLY.late];
  const shortData=[...NOTICE_MONTHLY.short,...NOTICE_WEEKLY.short];
  const longData=[...NOTICE_MONTHLY.long,...NOTICE_WEEKLY.long];
  const NML=mLabels.length;
  NM2=new Chart(ctx,{
    type:'bar',
    data:{labels:allLabels,datasets:[
      {label:'late notice (<0 days)',data:lateData,backgroundColor:'#374151',stack:'a'},
      {label:'long notice (≥4 days)',data:longData,backgroundColor:'#378ADD',stack:'a'},
      {label:'short notice (0-3 days)',data:shortData,backgroundColor:'rgba(180,178,169,0.7)',stack:'a'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{
        afterBody:items=>{const tot=items.reduce((s,i)=>s+i.parsed.y,0);return [`Total: ${tot}`];}
      }}},
      scales:{
        x:{stacked:true,ticks:{font:{size:10},color:(c)=>c.index<NML?'#3a3a3a':'#666',maxRotation:35,autoSkip:false},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{stacked:true,beginAtZero:true,ticks:{font:{size:10},color:'#555'},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    },plugins:[{id:'divN',afterDraw(c){
      const ctx=c.ctx,x=c.scales.x,y=c.scales.y;
      const px=(x.getPixelForValue(NML-1)+x.getPixelForValue(NML))/2;
      ctx.save();ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(px,y.top);ctx.lineTo(px,y.bottom);ctx.stroke();ctx.restore();
    }}]
  });
}

function buildHSRChart(){
  const ctx=document.getElementById('hsrc');if(!ctx)return;
  if(HSRC){HSRC.destroy();HSRC=null;}
  const mData=HSR_MONTHLY;
  const wData=WEEKS.map(w=>HSR_WEEKLY[w]||null);
  const data=[...mData,...wData];
  HSRC=new Chart(ctx,{
    type:'line',
    data:{labels:ALL,datasets:[{
      label:'Handover Success Rate %',
      data,borderColor:'#4ade80',backgroundColor:'#4ade80',
      tension:.35,borderWidth:2.5,
      pointRadius:ALL.map((_,i)=>i<NM?3:data[i]===null?0:5),
      pointHoverRadius:7,
      spanGaps:false,
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`Success Rate: ${i.parsed.y}%`}}},
      scales:{
        x:{ticks:{font:{size:10},color:(c)=>c.index<NM?'#3a3a3a':'#666',maxRotation:35,autoSkip:false},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{min:40,max:100,ticks:{font:{size:10},color:'#555',callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    },plugins:[DIV_PLUGIN]
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const tab=activeTab,isOv=tab==='Overall',col=TC[tab]||'#378ADD';

  // ── COMPARISON LOGIC: only completed periods ──────────────────────────────
  // Weekly: compare last complete (Apr 27) vs prev complete (Apr 20)
  const cmpW=wt(CMP_W,tab);      // Apr 27 – last complete week
  const cmpWPrev=wt(CMP_W_PREV,tab); // Apr 20 – comparison base
  // Current partial week for display only (no delta against it)
  const partialW=CURRENT_PARTIAL_W?wt(CURRENT_PARTIAL_W,tab):null;

  // Monthly: compare last complete month (Apr, idx 3) vs prev complete (Mar, idx 2)
  const cmpM=mt(LAST_COMPLETE_M_IDX,tab);
  const cmpMPrev=mt(PREV_COMPLETE_M_IDX,tab);
  const lastCompleteMonthLabel=ML[LAST_COMPLETE_M_IDX];   // Apr
  const prevCompleteMonthLabel=ML[PREV_COMPLETE_M_IDX];   // Mar

  // HSR: last complete week (Apr 27 = 72.9%) vs prev complete (Apr 20 = 68.2%)
  const hsrCmp=HSR_WEEKLY[CMP_W]||null;
  const hsrCmpPrev=HSR_WEEKLY[CMP_W_PREV]||null;

  const svk=WEEKS.map(w=>wt(w,tab));
  const rs=topR(CMP_W,tab,8),mxR=rs[0]?.c||1; // reasons from last complete week

  // Slack status banners
  const slackBanners=`
    <div class="slack-status">
      <div class="slack-pill ${SLACK_STATUS.infleeting.available?'slack-ok':'slack-missing'}">
        ${SLACK_STATUS.infleeting.available?'✓':'⚠'} Infleeting Weekly Update
        ${SLACK_STATUS.infleeting.available?`Stand: ${SLACK_STATUS.infleeting.stand}`:`Noch nicht verfügbar – letzter Stand: ${SLACK_STATUS.infleeting.stand}`}
      </div>
      <div class="slack-pill ${SLACK_STATUS.tech.available?'slack-ok':'slack-missing'}">
        ${SLACK_STATUS.tech.available?'✓':'⚠'} Tech Weekly Update
        ${SLACK_STATUS.tech.available?`Stand: ${SLACK_STATUS.tech.stand}`:`Noch nicht verfügbar – letzter Stand: ${SLACK_STATUS.tech.stand}`}
      </div>
    </div>`;

  // KPI cards
  const kpiCards=`
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Letzte abgeschl. Woche (Apr 27)</div>
        <div class="kpi-val">${cmpW}</div>
        <div class="kpi-delta">${fd(cmpW,cmpWPrev)} vs. Apr 20</div>
        <div class="kpi-sub">Vergleich: abgeschl. ↔ abgeschl.</div>
      </div>
      ${partialW!==null?`<div class="kpi-card" style="border-color:rgba(251,191,36,0.25);background:rgba(251,191,36,0.04)">
        <div class="kpi-label" style="color:#fbbf24">Laufende Woche (May 4) ⚠ unvollst.</div>
        <div class="kpi-val" style="color:#fbbf24">${partialW}</div>
        <div class="kpi-sub" style="color:#664d00">Kein Vergleich – Woche läuft noch (Do 07.05.)</div>
      </div>`:''}
      <div class="kpi-card ${hsrCmp>=70?'success':'warn'}">
        <div class="kpi-label">Handover Success Rate (Apr 27)</div>
        <div class="kpi-val">${hsrCmp||'—'}%</div>
        <div class="kpi-delta">${hsrCmp&&hsrCmpPrev?fd(hsrCmp,hsrCmpPrev)+' vs. Apr 20':''}</div>
        <div class="kpi-sub">Ziel: ≥70% · abgeschl. ↔ abgeschl.</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Monat ${lastCompleteMonthLabel} (abgeschlossen)</div>
        <div class="kpi-val">${cmpM}</div>
        <div class="kpi-delta">${fd(cmpM,cmpMPrev)} vs. ${prevCompleteMonthLabel}</div>
        <div class="kpi-sub">Vergleich: abgeschl. ↔ abgeschl.</div>
      </div>
      <div class="spark-kpi">
        <div class="kpi-label" style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">10-Wochen Trend – ${tab}</div>
        ${spk(svk,col,44,220)}
        <div style="display:flex;justify-content:space-between;font-size:9px;color:#2a2a2a;margin-top:4px;"><span>${WL[0]}</span><span>${WL[WL.length-1]} ⚠</span></div>
      </div>
    </div>`;

  // Team tiles – use last complete week for tile values and WoW delta
  let tgrid='';
  if(isOv){
    tgrid=`<div class="tgrid">${TEAMS.map(t=>{
      const cu=wt(CMP_W,t),pr=wt(CMP_W_PREV,t),d=pr>0?Math.round(((cu-pr)/pr)*100):0,dc=d>0?'#f87171':d<0?'#4ade80':'#555';
      return `<div class="ttile" onclick="setTab('${t}')" onmouseover="this.style.borderColor='${TC[t]}66'" onmouseout="this.style.borderColor='rgba(255,255,255,0.06)'">
        <div class="tname" style="color:${TC[t]}">${t}</div><div class="tval">${cu}</div>
        <div class="tbot">${spk(WEEKS.map(w=>wt(w,t)),TC[t],28,100)}<div class="tdelta" style="color:${dc}">${d>0?'▲':d<0?'▼':'–'}${Math.abs(d)}%</div></div>
      </div>`;}).join('')}</div>`;
  }

  // Right panel
  let rp='';
  if(!isOv&&tab!=='Customer'&&INITS[tab]){
    rp=`<div class="panel"><div class="ptitle">Aktive Initiativen — ${tab}</div>${INITS[tab].map(({s,t,i})=>
      `<div class="iitem"><span class="badge ${s==='d'?'bd':s==='p'?'bp':'bw'}">${s==='d'?'✓ done':s==='p'?'⟳ progress':'⚠ watch'}</span><div><div class="itext">${t}</div><div class="iimp">${i}</div></div></div>`).join('')}</div>`;
  } else {
    rp=`<div class="panel"><div class="ptitle">Wöchentlicher Verlauf — letzte 6 abgeschl. Wochen</div>${WEEKS.slice(-7,-1).map((w,i)=>{
      // Only show last 6 complete weeks (exclude the partial current week)
      if(!isWeekComplete(w))return'';
      const v=wt(w,tab),mx=Math.max(...COMPLETE_WEEKS.map(x=>wt(x,tab)),1);
      const lbl=WL[WEEKS.indexOf(w)];
      const isLast=w===CMP_W;
      return `<div class="brow"><div class="blabel" style="${isLast?'color:#fff':''}">${lbl}${isLast?' ✓':''}</div><div class="btrack"><div class="bfill" style="width:${Math.round(v/mx*100)}%;background:${isLast?col:col+'88'}"></div></div><div class="bval" style="${isLast?'color:#fff':''}">${v}</div></div>`;
    }).join('')}
    ${CURRENT_PARTIAL_W?`<div class="brow" style="opacity:.5"><div class="blabel" style="color:#fbbf24">${WL[WEEKS.indexOf(CURRENT_PARTIAL_W)]} ⚠ laufend</div><div class="btrack"><div class="bfill" style="width:${Math.round(wt(CURRENT_PARTIAL_W,tab)/Math.max(...COMPLETE_WEEKS.map(x=>wt(x,tab)),1)*100)}%;background:#fbbf24"></div></div><div class="bval" style="color:#fbbf24">${wt(CURRENT_PARTIAL_W,tab)}</div></div>`:''}
    </div>`;
  }

  // Table – mark partial weeks/months
  const tteams=isOv?TEAMS:tab==='Customer'?['Customer']:[tab];
  const trows=tteams.map(t=>{
    const mc=MONTHS.map((_,mi)=>{
      const isCurrentMonth=!isMonthComplete(MONTHS[mi]);
      return `<td class="tdm${mi===0?' tddiv':''}" style="${isCurrentMonth?'color:#664d00':''}" title="${isCurrentMonth?'Laufender Monat – unvollständig':''}">${mt(mi,t)||'—'}${isCurrentMonth?'*':''}</td>`;
    }).join('');
    const wc=WEEKS.map((w,wi)=>{
      const v=tab==='Customer'?CR.filter(r=>r.w===w).reduce((s,r)=>s+r.c,0):WR.filter(r=>r.w===w&&r.t===t).reduce((s,r)=>s+r.c,0);
      const isComplete=isWeekComplete(w);
      const isLastComplete=w===CMP_W;
      return `<td class="${wi===0?'tdw tddiv':''}" style="${isLastComplete?'color:#fff;font-weight:600':isComplete?'color:#666':'color:#664d00'}" title="${!isComplete?'Laufende Woche – unvollständig':''}">${v||'—'}${!isComplete?'*':''}</td>`;
    }).join('');
    return `<tr><td style="color:${TC[t]||'#aaa'}">${t}</td>${mc}${wc}</tr>`;
  }).join('');
  const totrow=`<tr class="trow"><td>Total</td>${MONTHS.map((_,mi)=>{
    const isCurrentMonth=!isMonthComplete(MONTHS[mi]);
    return `<td class="tdm${mi===0?' tddiv':''}" style="${isCurrentMonth?'color:#664d00':''}">${at(mi,tab)}${isCurrentMonth?'*':''}</td>`;
  }).join('')}${WEEKS.map((w,wi)=>{
    const isComplete=isWeekComplete(w);
    const isLastComplete=w===CMP_W;
    return `<td class="${wi===0?'tdw tddiv':''}" style="${isLastComplete?'color:#fff;font-weight:600':isComplete?'color:#555':'color:#664d00'}">${at(NM+wi,tab)}${!isComplete?'*':''}</td>`;
  }).join('')}</tr>`;

  document.getElementById('dash').innerHTML=`
    <div class="header">
      <div>
        <div class="live-row">
          <div class="dot"></div>
          <span class="live-label">Stand ${STAND}</span>
          ${!SLACK_STATUS.infleeting.available||!SLACK_STATUS.tech.available?'<span class="update-banner">⚠ Nicht alle Slack-Updates verfügbar</span>':''}
        </div>
        <h1>CC Logistics · Delay Dashboard</h1>
        <div class="meta">6 Monate monatlich · letzte 10 Wochen wöchentlich · biweekly aktualisiert</div>
      </div>
      <div style="font-size:11px;color:#444;text-align:right;">DWH: <code>fact_car_handover_event</code><br>fact_clsr_touchpoints</div>
    </div>

    ${slackBanners}
    ${kpiCards}

    <div class="tabs">
      <span class="tglabel">Overview</span>
      <button class="tab" onclick="setTab('Overall')" style="${isOv?'background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.5);color:#fff;font-weight:600':''}">Overall</button>
      <div class="tdivider"></div>
      <span class="tglabel">FINN Teams</span>
      ${TEAMS.map(t=>`<button class="tab" onclick="setTab('${t}')" style="${tab===t?`background:${TC[t]}22;border-color:${TC[t]};color:${TC[t]};font-weight:600`:''}">${t}</button>`).join('')}
      <div class="tdivider"></div>
      <span class="tglabel">Extern</span>
      <button class="tab" onclick="setTab('Customer')" style="${tab==='Customer'?`background:${TC.Customer}22;border-color:${TC.Customer};color:${TC.Customer};font-weight:600`:`border-color:${TC.Customer}55;color:${TC.Customer}99`}">Customer-caused</button>
    </div>

    ${tgrid}

    <div class="cbox">
      <div class="ctitle">${isOv?'Gesamtentwicklung – alle Teams':'Gesamtentwicklung – '+tab}</div>
      <div class="csub">← 6 Monate monatlich &nbsp;|&nbsp; wöchentlich → &nbsp;·&nbsp; Tooltip zeigt Total je Periode</div>
      <div class="cleg" id="ml"></div>
      <div style="position:relative;width:100%;height:200px;"><canvas id="mc"></canvas></div>
    </div>

    <div class="cbox" id="rw" style="display:none">
      <div class="ctitle">Top Delay Reasons – Verlauf (${tab})</div>
      <div class="csub">← 6 Monate monatlich &nbsp;|&nbsp; wöchentlich →</div>
      <div class="cleg" id="rl"></div>
      <div style="position:relative;width:100%;height:200px;"><canvas id="rc"></canvas></div>
    </div>

    <div class="g2">
      <div class="panel">
        <div class="ptitle">Top Delay Reasons — Apr 27 (letzte abgeschl. Woche) &nbsp;<span style="font-size:9px;color:#444;font-weight:400;text-transform:none;">(hover für Details)</span></div>
        ${rs.map(({r,c})=>reasonBar(r,c,mxR,col)).join('')}
      </div>
      ${rp}
    </div>

    <div class="cbox">
      <div class="ctitle">Delay Notice Period — Monatlich + Wöchentlich</div>
      <div class="csub">← monatlich (Okt–Mar) &nbsp;|&nbsp; wöchentlich → &nbsp;·&nbsp; Late notice = bereits überfällig bei Shift; Short notice = 0-3 Tage; Long notice = ≥4 Tage</div>
      <div class="notice-legend">
        <span><span class="ldot" style="background:#378ADD"></span>Long notice (≥4 days)</span>
        <span><span class="ldot" style="background:rgba(180,178,169,0.7)"></span>Short notice (0-3 days)</span>
        <span><span class="ldot" style="background:#374151"></span>Late notice (&lt;0 days)</span>
      </div>
      <div style="position:relative;width:100%;height:220px;"><canvas id="nmc"></canvas></div>
    </div>

    <div class="cbox">
      <div class="ctitle">Handover Success Rate — Verlauf</div>
      <div class="csub">← 6 Monate monatlich &nbsp;|&nbsp; wöchentlich → &nbsp;·&nbsp; May 11: Daten noch nicht vollständig verfügbar</div>
      <div style="position:relative;width:100%;height:160px;"><canvas id="hsrc"></canvas></div>
    </div>

    <div class="twrap">
      <div class="ptitle" style="margin-bottom:4px">Detail-Tabelle — monatlich + wöchentlich</div>
      <div style="font-size:10px;color:#555;margin-bottom:12px;">* = laufende Periode (unvollständig) · <strong style="color:#fff">Fett</strong> = letzte abgeschlossene Periode · Deltas immer abgeschl. ↔ abgeschl.</div>
      <table><thead><tr>
        <th style="text-align:left">Team</th>
        ${MONTHS.map((_,i)=>{const isCurr=!isMonthComplete(MONTHS[i]);return `<th class="thm${i===0?' thdiv':''}" style="${isCurr?'color:#664d00':i===LAST_COMPLETE_M_IDX?'color:#fff;font-weight:600':''}">${ML[i]}${isCurr?'*':''}</th>`;}).join('')}
        ${WEEKS.map((w,i)=>{const isC=isWeekComplete(w);const isLast=w===CMP_W;return `<th class="${i===0?'thdiv ':''}" style="${isLast?'color:#fff;font-weight:600':isC?'color:#aaa':'color:#664d00'}">${WL[i]}${!isC?'*':''}</th>`;}).join('')}
      </tr></thead><tbody>${trows}${totrow}</tbody></table>
    </div>
    <div class="footer">fact_car_handover_event + fact_clsr_touchpoints · delay_days > 0 · non-silent · Stand ${STAND} · * = laufende Periode</div>
  `;

  buildMain(tab);
  buildReason(tab);
  buildNoticeChart();
  buildHSRChart();
}

window.setTab=function(t){activeTab=t;render();};
if(sessionStorage.getItem('cca')==='1') render();
</script>
</body>
</html>
