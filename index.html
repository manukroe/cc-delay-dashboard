*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0d0f14;color:#e2e8f0;min-height:100vh;}
#gate{position:fixed;inset:0;background:#0d0f14;display:flex;align-items:center;justify-content:center;z-index:9999;}
.gate-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px 48px;text-align:center;min-width:320px;}
.gate-logo{font-size:13px;font-weight:600;color:#378ADD;letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;}
.gate-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:6px;}
.gate-sub{font-size:12px;color:#555;margin-bottom:28px;}
.gate-input{width:100%;padding:11px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-align:center;outline:none;transition:border-color .2s;}
.gate-input:focus{border-color:#378ADD;}
.gate-input.err{border-color:#f87171;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.gate-btn{margin-top:14px;width:100%;padding:11px;background:#378ADD;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;}
.gate-btn:hover{opacity:.85;}
.gate-err{font-size:11px;color:#f87171;margin-top:10px;min-height:16px;}
#app{display:none;}
.dash{padding:24px 28px;max-width:1200px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
.live-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.live-label{font-size:10px;color:#4ade80;letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
h1{font-size:20px;font-weight:600;color:#fff;letter-spacing:-.03em;}
.meta{font-size:11px;color:#444;margin-top:3px;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:18px;}
.kpi-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 16px;}
.kpi-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.kpi-val{font-size:26px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;letter-spacing:-.02em;line-height:1;}
.kpi-delta{font-size:11px;margin-top:5px;}
.kpi-sub{font-size:10px;color:#444;margin-top:3px;}
.kpi-card.success{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.04);}
.kpi-card.success .kpi-val{color:#4ade80;}
.kpi-card.warn{border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.04);}
.kpi-card.warn .kpi-val{color:#f87171;}
.kpi-card.partial{border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.04);}
.spark-kpi{flex:1;min-width:200px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:13px 16px;display:flex;flex-direction:column;justify-content:center;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.tglabel{font-size:9px;color:#333;text-transform:uppercase;letter-spacing:.08em;margin:0 3px;}
.tdiv{width:1px;height:24px;background:rgba(255,255,255,0.08);margin:0 4px;}
.tab{padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#666;font-family:'DM Sans',sans-serif;transition:all .15s;}
.tab:hover{color:#aaa;border-color:rgba(255,255,255,0.2);}
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:9px;margin-bottom:18px;}
.ttile{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:12px 14px;cursor:pointer;transition:border-color .2s;}
.tname{font-size:11px;font-weight:600;margin-bottom:6px;}
.tval{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:#fff;letter-spacing:-.02em;margin-bottom:7px;}
.tbot{display:flex;justify-content:space-between;align-items:flex-end;}
.cbox{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
.ctitle{font-size:11px;color:#888;font-weight:600;margin-bottom:2px;}
.csub{font-size:10px;color:#333;margin-bottom:10px;}
.cleg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.cleg span{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
/* Data basis toggle */
.dbasis-toggle{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:#555;cursor:pointer;margin-bottom:8px;padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);}
.dbasis-toggle:hover{color:#888;border-color:rgba(255,255,255,0.15);}
.dbasis-content{display:none;background:rgba(20,22,32,0.98);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:12px 14px;font-size:10px;color:#888;line-height:1.7;margin-bottom:10px;}
.dbasis-content.open{display:block;}
.dbasis-content strong{color:#bbb;display:block;margin-bottom:4px;}
.dbasis-content .tag{display:inline-block;background:rgba(55,138,221,0.15);border:1px solid rgba(55,138,221,0.3);color:#378ADD;border-radius:4px;padding:1px 6px;font-size:9px;margin:1px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:700px){.g2{grid-template-columns:1fr;}}
.panel{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px 18px;}
.ptitle{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
/* Reason bars with hover tooltip */
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px;position:relative;}
.blabel{width:175px;font-size:11px;color:#bbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;cursor:help;border-bottom:1px dashed rgba(255,255,255,0.18);}
.blabel:hover{color:#fff;}
.btrack{flex:1;height:9px;background:rgba(255,255,255,0.07);border-radius:4px;}
.bfill{height:9px;border-radius:4px;transition:width .5s ease;}
.bval{width:28px;font-size:11px;color:#777;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace;}
.rtt{display:none;position:absolute;left:0;top:110%;z-index:200;background:#13151f;border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:12px 14px;min-width:280px;max-width:380px;line-height:1.55;box-shadow:0 12px 32px rgba(0,0,0,0.7);}
.brow:hover .rtt{display:block;}
.rtt-title{font-size:12px;font-weight:600;color:#fff;margin-bottom:6px;}
.rtt-section{margin-bottom:6px;}
.rtt-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#555;margin-bottom:2px;}
.rtt-text{font-size:11px;color:#bbb;}
.rtt-meta{font-size:10px;color:#444;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.07);}

.iitem{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;}
.badge{font-size:9px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;font-weight:500;}
.bd{background:#4ade8022;color:#4ade80;border:1px solid #4ade8044;}
.bp{background:#60a5fa22;color:#60a5fa;border:1px solid #60a5fa44;}
.bw{background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf2444;}
.itext{font-size:12px;color:#ccc;line-height:1.4;}
.iimp{font-size:11px;color:#666;margin-top:3px;line-height:1.4;}
/* Notice legend */
.nleg{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
.nleg span{display:flex;align-items:center;gap:5px;font-size:11px;color:#888;}

.slack-pill{font-size:11px;padding:5px 11px;border-radius:8px;border:1px solid;}
.slack-ok{background:rgba(74,222,128,0.07);border-color:rgba(74,222,128,0.25);color:#4ade80;}
.slack-miss{background:rgba(251,191,36,0.07);border-color:rgba(251,191,36,0.25);color:#fbbf24;}

table{width:100%;border-collapse:collapse;font-size:11px;}
th{text-align:right;padding:5px 6px;color:#555;font-weight:500;white-space:nowrap;}
th:first-child{text-align:left;padding-left:0;}
td{text-align:right;padding:6px 6px;color:#555;font-family:'DM Mono',monospace;border-top:1px solid rgba(255,255,255,0.05);}
td:first-child{text-align:left;padding-left:0;font-family:'DM Sans',sans-serif;font-weight:500;}
tr.trow td{border-top:1px solid rgba(255,255,255,0.1);color:#999;font-weight:600;}
.thdiv{border-left:1px solid rgba(255,255,255,0.1)!important;}
.tddiv{border-left:1px solid rgba(255,255,255,0.07)!important;}
.footer{font-size:10px;color:#222;text-align:center;padding:16px 0 8px;}

function gc(){
  const v=document.getElementById('gi').value;
  if(v==='CCLogisticsWinners'){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    sessionStorage.setItem('cca','1');render();
  } else {
    const i=document.getElementById('gi');
    i.classList.add('err');document.getElementById('ge').textContent='Incorrect code.';
    setTimeout(()=>i.classList.remove('err'),400);i.value='';
  }
}

function wt(w,t){
  if(t==='Customer')return CR.filter(r=>r.w===w).reduce((s,r)=>s+r.c,0);
  if(t==='Overall')return TEAMS.reduce((s,x)=>s+wt(w,x),0);
  return WR.filter(r=>r.w===w&&r.t===t).reduce((s,r)=>s+r.c,0);
}
function mt(mi,t){
  if(t==='Customer')return CUSTM[mi].reduce((a,b)=>a+b,0);
  if(t==='Overall')return TEAMS.reduce((s,x)=>s+mt(mi,x),0);
  return Object.values(MDATA[t]||{}).reduce((s,a)=>s+(a[mi]||0),0);
}
function at(i,t){return i<NM?mt(i,t):wt(WEEKS[i-NM],t);}
function topR(w,t,n=8){
  let rows;
  if(t==='Customer')rows=CR.filter(r=>r.w===w);
  else if(t==='Overall'){const m={};TEAMS.forEach(x=>WR.filter(r=>r.w===w&&r.t===x).forEach(r=>{m[r.r]=(m[r.r]||0)+r.c;}));rows=Object.entries(m).map(([r,c])=>({r,c}));}
  else rows=WR.filter(r=>r.w===w&&r.t===t);
  return [...rows].sort((a,b)=>b.c-a.c).slice(0,n);
}
function spk(vals,col,h=38,w=140){
  if(!vals||vals.length<2)return '';
  const mx=Math.max(...vals,1);
  const pts=vals.map((v,i)=>{const x=(i/(vals.length-1))*w,y=h-(v/mx)*h*.88;return `${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ');
  const dots=vals.map((v,i)=>{const x=(i/(vals.length-1))*w,y=h-(v/mx)*h*.88,r=i===vals.length-1?4:2;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${col}"/>`;}).join('');
  return `<svg width="${w}" height="${h}" style="overflow:visible;display:block"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>${dots}</svg>`;
}
function fd(cur,prv){
  if(!prv||prv===0)return '';
  const d=cur-prv,p=Math.round(Math.abs(d)/prv*100),col=d===0?'#555':d<0?'#4ade80':'#f87171';
  return `<span style="color:${col}">${d>0?'▲':d<0?'▼':'–'} ${p}%</span>`;
}
function reasonBar(r,c,mxR,col){
  const tt=RTT[r];
  let tip='';
  if(tt){
    tip=`<div class="rtt">
      <div class="rtt-title">${r}</div>
      <div class="rtt-section"><div class="rtt-label">Internal guidance</div><div class="rtt-text">${tt.internal}</div></div>
      <div class="rtt-section"><div class="rtt-label">Customer-facing message</div><div class="rtt-text" style="color:#a78bfa;font-style:italic">"${tt.customer}"</div></div>
      <div class="rtt-meta">ID: ${tt.id} · Team: ${tt.team} · Shift by: ${tt.shift} · Avg duration: ${tt.avgDays}</div>
    </div>`;
  }
  return `<div class="brow"><div class="blabel" title="${r}${tt?' – hover for details':''}">${r}</div><div class="btrack"><div class="bfill" style="width:${Math.round(c/mxR*100)}%;background:${col}"></div></div><div class="bval">${c}</div>${tip}</div>`;
}

}

}};

  let ds;
  if(tab==='Overall'){
    ds=TEAMS.map(t=>({label:t,data:aidx.map(i=>at(i,t)),backgroundColor:TC[t],stack:'s'}));
    leg.innerHTML=TEAMS.map(t=>`<span><span class="ldot" style="background:${TC[t]}"></span>${t}</span>`).join('');
  } else {
    const col=TC[tab]||'#378ADD';
    ds=[{label:tab,data:aidx.map(i=>at(i,tab)),backgroundColor:col,stack:'s'}];
    leg.innerHTML=`<span><span class="ldot" style="background:${col}"></span>${tab}</span>`;
  }
  Chart.register(ChartDataLabels);
  CM=new Chart(ctx,{
    type:'bar',
    data:{labels:ALL,datasets:ds},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        datalabels:{
          display:(ctx)=>ctx.datasetIndex===ds.length-1,
          anchor:'end',align:'end',
          formatter:(val,ctx)=>{
            const i=ctx.dataIndex;
            const tot=ds.reduce((s,d)=>s+(d.data[i]||0),0);
            return tot>0?tot:'';
          },
          color:'rgba(255,255,255,0.5)',font:{size:9},
        },
        tooltip:{mode:'index',intersect:false,callbacks:{
          afterBody:items=>{const tot=items.reduce((s,i)=>s+i.parsed.y,0);return [`Total: ${tot}`];}
        }}
      },
      scales:{
        x:{stacked:true,ticks:{font:{size:10},color:(c)=>c.index<NM?'#3a3a3a':'#777',maxRotation:35,autoSkip:false},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{stacked:true,beginAtZero:true,ticks:{font:{size:10},color:'#555'},grid:{color:'rgba(255,255,255,0.05)'}},
      }
    },
    plugins:[DVIDER]
  });
}

// ── CHART: Reason trend ───────────────────────────────────────────────────────
function buildReason(tab){
  const wrap=document.getElementById('rw');if(!wrap)return;
  if(tab==='Overall'||tab==='Customer'){wrap.style.display='none';return;}
  wrap.style.display='block';
  const ctx=document.getElementById('rc');if(!ctx)return;
  if(RM){RM.destroy();RM=null;}
  const pal=RP[tab],aidx=ALL.map((_,i)=>i);
  const rset=new Set();
  if(MDATA[tab])Object.keys(MDATA[tab]).forEach(r=>rset.add(r));
  WR.filter(r=>r.t===tab).forEach(r=>rset.add(r.r));
  const scored=[...rset].map(r=>{const lv=WR.filter(x=>x.t===tab&&x.w===LCW&&x.r===r).reduce((s,x)=>s+x.c,0);return{r,lv};}).sort((a,b)=>b.lv-a.lv).slice(0,5);
  const leg=document.getElementById('rl');leg.innerHTML='';
  const ds=scored.map(({r},i)=>{
    const data=aidx.map(idx=>{if(idx<NM)return(MDATA[tab]?.[r]?.[idx])||0;return WR.filter(x=>x.t===tab&&x.w===WEEKS[idx-NM]&&x.r===r).reduce((s,x)=>s+x.c,0);});
    leg.innerHTML+=`<span><span class="ldot" style="background:${pal[i%pal.length]}"></span>${r}</span>`;
    return{label:r,data,backgroundColor:pal[i%pal.length],stack:'s'+(i)};
  });
  RM=new Chart(document.getElementById('rc'),{
    type:'bar',data:{labels:ALL,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},datalabels:{display:false},tooltip:{mode:'index',intersect:false}},
      scales:{x:{ticks:{font:{size:10},color:(c)=>c.index<NM?'#3a3a3a':'#777',maxRotation:35,autoSkip:false},grid:{color:'rgba(255,255,255,0.03)'}},y:{beginAtZero:true,ticks:{font:{size:10},color:'#555'},grid:{color:'rgba(255,255,255,0.05)'}}}
    },plugins:[DVIDER]
  });
}

// ── CHART: Notice period stacked bar ─────────────────────────────────────────
function buildNotice(){
  const ctx=document.getElementById('nmc');if(!ctx)return;
  if(NPC){NPC.destroy();NPC=null;}
  const mL=NP_M.labels,wL=WL,allL=[...mL,...wL],NML=mL.length;
  const late=[...NP_M.late,...NP_W.late];
  const short=[...NP_M.short,...NP_W.short];
  const long=[...NP_M.long,...NP_W.long];
  NPC=new Chart(ctx,{
    type:'bar',
    data:{labels:allL,datasets:[
      {label:'Late notice (<0 days)',data:late,backgroundColor:'#EF4444',stack:'n'},
      {label:'Short notice (0–3 days)',data:short,backgroundColor:'#F59E0B',stack:'n'},
      {label:'Long notice (≥4 days)',data:long,backgroundColor:'#378ADD',stack:'n'},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        datalabels:{
          display:(ctx)=>ctx.datasetIndex===2,
          anchor:'end',align:'end',
          formatter:(val,ctx)=>{
            const i=ctx.dataIndex;
            const tot=late[i]+short[i]+long[i];
            return tot>0?tot:'';
          },
          color:'rgba(255,255,255,0.45)',font:{size:9},
        },
        tooltip:{mode:'index',intersect:false,callbacks:{
          afterBody:items=>{const tot=items.reduce((s,i)=>s+i.parsed.y,0);return [`Total: ${tot}`];}
        }}
      },
      scales:{
        x:{stacked:true,ticks:{font:{size:10},color:(c)=>c.index<NML?'#3a3a3a':'#777',maxRotation:35,autoSkip:false},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{stacked:true,beginAtZero:true,ticks:{font:{size:10},color:'#555'},grid:{color:'rgba(255,255,255,0.05)'}},
      }
    },
    plugins:[{id:'dvN',afterDraw(c){
      const ctx=c.ctx,x=c.scales.x,y=c.scales.y;
      const px=(x.getPixelForValue(NML-1)+x.getPixelForValue(NML))/2;
      ctx.save();ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(px,y.top);ctx.lineTo(px,y.bottom);ctx.stroke();ctx.restore();
    }},ChartDataLabels]
  });
}

// ── CHART: HSR ───────────────────────────────────────────────────────────────
function buildHSR(){
  const ctx=document.getElementById('hsrc');if(!ctx)return;
  if(HSRC){HSRC.destroy();HSRC=null;}
  const mD=HSR_M,wD=WEEKS.map(w=>HSR_W[w]??null);
  HSRC=new Chart(ctx,{
    type:'line',
    data:{labels:ALL,datasets:[
      {label:'HSR %',data:[...mD,...wD],borderColor:'#4ade80',backgroundColor:'rgba(74,222,128,0.08)',tension:.35,borderWidth:2.5,fill:true,
       pointRadius:ALL.map((_,i)=>i<NM?3:(wD[i-NM]===null?0:5)),pointHoverRadius:7,spanGaps:false},
      {label:'Target 70%',data:ALL.map(()=>70),borderColor:'rgba(255,255,255,0.12)',borderDash:[4,4],borderWidth:1,pointRadius:0,datalabels:{display:false}},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},datalabels:{display:false},tooltip:{callbacks:{label:i=>`${i.dataset.label}: ${i.parsed.y}%`}}},
      scales:{
        x:{ticks:{font:{size:10},color:(c)=>c.index<NM?'#3a3a3a':'#777',maxRotation:35,autoSkip:false},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{min:40,max:100,ticks:{font:{size:10},color:'#555',callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.05)'}},
      }
    },plugins:[DVIDER,ChartDataLabels]
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const tab=activeTab,isOv=tab==='Overall',col=TC[tab]||'#378ADD';
  const cW=wt(LCW,tab),pW=wt(PCW,tab);
  const cM=mt(LCMI,tab),pM=mt(PCMI,tab);
  const hsrC=HSR_W[LCW],hsrP=HSR_W[PCW];
  const svk=WEEKS.map(w=>wt(w,tab));
  const rs=topR(LCW,tab,8),mxR=rs[0]?.c||1;

  // Slack banners
  const slackHtml=`<div class="slack-row">
    <div class="slack-pill ${SLACK.infleeting.ok?'slack-ok':'slack-miss'}">
      ${SLACK.infleeting.ok?'✓':'⚠'} Infleeting update · ${SLACK.infleeting.date}
      ${SLACK.infleeting.ok?` · ${SLACK.infleeting.summary.substring(0,90)}…`:'– pending'}
    </div>
    <div class="slack-pill ${SLACK.tech.ok?'slack-ok':'slack-miss'}">
      ${SLACK.tech.ok?'✓':'⚠'} Tech update · ${SLACK.tech.date}
      ${SLACK.tech.ok?` · ${SLACK.tech.summary.substring(0,90)}…`:'– pending'}
    </div>
  </div>`;

  // KPI row
  const kpiHtml=`<div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Last complete week (${WL[WEEKS.indexOf(LCW)]})</div>
      <div class="kpi-val">${cW}</div>
      <div class="kpi-delta">${fd(cW,pW)} vs. ${WL[WEEKS.indexOf(PCW)]}</div>
      <div class="kpi-sub">complete ↔ complete</div>
    </div>
    <div class="kpi-card ${hsrC>=70?'success':'warn'}">
      <div class="kpi-label">Handover Success Rate</div>
      <div class="kpi-val">${hsrC??'—'}%</div>
      <div class="kpi-delta">${hsrC&&hsrP?fd(hsrC,hsrP)+' vs. '+WL[WEEKS.indexOf(PCW)]:''}</div>
      <div class="kpi-sub">Target ≥70% · complete ↔ complete</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Last complete month (${ML[LCMI]})</div>
      <div class="kpi-val">${cM}</div>
      <div class="kpi-delta">${fd(cM,pM)} vs. ${ML[PCMI]}</div>
      <div class="kpi-sub">complete ↔ complete</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Customer delays · ${WL[WEEKS.indexOf(LCW)]}</div>
      <div class="kpi-val">${wt(LCW,'Customer')}</div>
      <div class="kpi-delta">${fd(wt(LCW,'Customer'),wt(PCW,'Customer'))} vs. ${WL[WEEKS.indexOf(PCW)]}</div>
      <div class="kpi-sub">complete ↔ complete</div>
    </div>
    <div class="spark-kpi">
      <div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">8-week trend · ${tab}</div>
      ${spk(svk,col,44,220)}
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#2a2a2a;margin-top:4px;"><span>${WL[0]}</span><span>${WL[WL.length-1]}</span></div>
    </div>
  </div>`;

  // Team tiles
  let tgrid='';
  if(isOv){
    tgrid=`<div class="tgrid">${TEAMS.map(t=>{
      const cu=wt(LCW,t),pr=wt(PCW,t),d=pr>0?Math.round(((cu-pr)/pr)*100):0,dc=d>0?'#f87171':d<0?'#4ade80':'#555';
      return `<div class="ttile" onclick="setTab('${t}')" onmouseover="this.style.borderColor='${TC[t]}88'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)'">
        <div class="tname" style="color:${TC[t]}">${t}</div>
        <div class="tval">${cu}</div>
        <div class="tbot">${spk(WEEKS.map(w=>wt(w,t)),TC[t],28,100)}<div style="font-size:10px;color:${dc}">${d>0?'▲':d<0?'▼':'–'}${Math.abs(d)}%</div></div>
      </div>`;}).join('')}</div>`;
  }

  // Right panel
  let rp='';
  if(!isOv&&tab!=='Customer'&&INITS[tab]){
    rp=`<div class="panel"><div class="ptitle">Active initiatives — ${tab}</div>${INITS[tab].map(({s,t,i})=>
      `<div class="iitem"><span class="badge ${s==='d'?'bd':s==='p'?'bp':'bw'}">${s==='d'?'✓ done':s==='p'?'⟳ in progress':'⚠ watch'}</span><div><div class="itext">${t}</div><div class="iimp">${i}</div></div></div>`).join('')}</div>`;
  } else {
    const cWeeks=CW.slice(-6);
    rp=`<div class="panel"><div class="ptitle">Weekly trend — last 6 complete weeks</div>
      ${cWeeks.map(w=>{const v=wt(w,tab),mx=Math.max(...CW.map(x=>wt(x,tab)),1),isL=w===LCW,lbl=WL[WEEKS.indexOf(w)];
        return `<div class="brow"><div class="blabel" style="${isL?'color:#fff':''}">${lbl}${isL?' ✓':''}</div><div class="btrack"><div class="bfill" style="width:${Math.round(v/mx*100)}%;background:${isL?col:col+'77'}"></div></div><div class="bval" style="${isL?'color:#fff':''}">${v}</div></div>`;}).join('')}
    </div>`;
  }

  // Table
  const tteams=isOv?TEAMS:tab==='Customer'?['Customer']:[tab];
  const trows=tteams.map(t=>{
    const mc=MONTHS.map((_,mi)=>{const isL=mi===LCMI;return `<td class="tdm${mi===0?' tddiv':''}" style="${isL?'color:#ddd':''}">${mt(mi,t)||'—'}</td>`;}).join('');
    const wc=WEEKS.map((w,wi)=>{
      const v=tab==='Customer'?CR.filter(r=>r.w===w).reduce((s,r)=>s+r.c,0):WR.filter(r=>r.w===w&&r.t===t).reduce((s,r)=>s+r.c,0);
      const isL=w===LCW;
      return `<td class="${wi===0?'tddiv':''}" style="${isL?'color:#fff;font-weight:600':'color:#666'}">${v||'—'}</td>`;
    }).join('');
    return `<tr><td style="color:${TC[t]||'#aaa'}">${t}</td>${mc}${wc}</tr>`;
  }).join('');
  const totrow=`<tr class="trow"><td>Total</td>${MONTHS.map((_,mi)=>{const isL=mi===LCMI;return `<td class="${mi===0?'tddiv':''}" style="${isL?'color:#ddd':''}">${at(mi,tab)}</td>`;}).join('')}${WEEKS.map((w,wi)=>{const isL=w===LCW;return `<td class="${wi===0?'tddiv':''}" style="${isL?'color:#fff;font-weight:600':'color:#555'}">${at(NM+wi,tab)}</td>`;}).join('')}</tr>`;

  // Data basis strings
  const mainBasis=`<strong>Filters applied</strong>
    <span class="tag">delay_days > 0</span><span class="tag">is_silent_delay = FALSE</span><span class="tag">is_finn_shift = TRUE</span><span class="tag">delay_responsible_team ≠ 'Non-Ops Delays'</span>
    <br><strong>Source</strong> datawarehouse-304513.semantic.fact_car_handover_event
    <br><strong>Note</strong> Monthly = calendar month totals. Weekly = Mon–Sun. Only completed periods used for KPI comparisons. Current partial week shown separately.`;
  const noticeBasis=`<strong>Filters applied</strong>
    <span class="tag">delay_days > 0</span><span class="tag">is_silent_delay = FALSE</span><span class="tag">is_finn_shift = TRUE</span><span class="tag">delay_responsible_team ≠ 'Non-Ops Delays'</span>
    <br><strong>Definitions</strong>
    <span class="tag">Late notice</span> total_days_negative &lt; 0 → shift happened after the original handover date (already overdue)
    <span class="tag">Short notice</span> total_days_negative = 0 AND total_days_positive 0–3 → communicated 0–3 days before handover
    <span class="tag">Long notice</span> total_days_positive ≥ 4 → communicated 4+ days before handover (customer has time to plan)
    <br><strong>Source</strong> fact_car_handover_event · columns: total_days_negative, total_days_positive`;
  const hsrBasis=`<strong>Filters applied</strong>
    <span class="tag">touchpoint_type_id = 'handover_success_rate'</span>
    <br><strong>Definition</strong> Successful handover touchpoint = vehicle was handed over to customer without issues on the scheduled date.
    Success Rate = successful / (successful + failed) × 100.
    <br><strong>Note</strong> May 11 onwards: data not yet fully populated (touchpoints recorded with delay).
    <br><strong>Source</strong> datawarehouse-304513.semantic.fact_clsr_touchpoints`;

  document.getElementById('dash').innerHTML=`
    <div class="header">
      <div>
        <div class="live-row"><div class="dot"></div><span class="live-label">Updated ${STAND}</span></div>
        <h1>CC Logistics · Delay Dashboard</h1>
        <div class="meta">6 months monthly · 8 complete weeks weekly · Updated biweekly</div>
      </div>
      <div style="font-size:10px;color:#333;text-align:right;line-height:1.8;">Source: DWH<br>fact_car_handover_event<br>fact_clsr_touchpoints</div>
    </div>

    ${slackHtml}
    ${kpiHtml}

    <div class="tabs">
      <span class="tglabel">Overview</span>
      <button class="tab" onclick="setTab('Overall')" style="${isOv?'background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4);color:#fff;font-weight:600':''}">Overall</button>
      <div class="tdiv"></div>
      <span class="tglabel">FINN Teams</span>
      ${TEAMS.map(t=>`<button class="tab" onclick="setTab('${t}')" style="${tab===t?`background:${TC[t]}22;border-color:${TC[t]};color:${TC[t]};font-weight:600`:''}">${t}</button>`).join('')}
      <div class="tdiv"></div>
      <span class="tglabel">External</span>
      <button class="tab" onclick="setTab('Customer')" style="${tab==='Customer'?`background:${TC.Customer}22;border-color:${TC.Customer};color:${TC.Customer};font-weight:600`:`border-color:${TC.Customer}44;color:${TC.Customer}88`}">Customer-caused</button>
    </div>

    ${tgrid}

    <div class="cbox">
      <div class="ctitle">${isOv?'Delay volume by team – all periods':'Delay volume – '+tab}</div>
      ${dbasisToggle('db1',mainBasis)}
      <div class="cleg" id="ml"></div>
      <div style="position:relative;width:100%;height:220px;"><canvas id="mc"></canvas></div>
    </div>

    <div class="cbox" id="rw" style="display:none">
      <div class="ctitle">Top delay reasons trend – ${tab}</div>
      ${dbasisToggle('db2',mainBasis)}
      <div class="cleg" id="rl"></div>
      <div style="position:relative;width:100%;height:210px;"><canvas id="rc"></canvas></div>
    </div>

    <div class="g2">
      <div class="panel">
        <div class="ptitle">Top delay reasons · ${WL[WEEKS.indexOf(LCW)]} (last complete week) &nbsp;<span style="font-size:9px;color:#444;font-weight:400;text-transform:none;">hover for details</span></div>
        ${rs.map(({r,c})=>reasonBar(r,c,mxR,col)).join('')}
      </div>
      ${rp}
    </div>

    <div class="cbox">
      <div class="ctitle">Delay notice period</div>
      ${dbasisToggle('db3',noticeBasis)}
      <div class="nleg">
        <span><span class="ldot" style="background:#EF4444"></span>Late notice (&lt;0 days – already overdue)</span>
        <span><span class="ldot" style="background:#F59E0B"></span>Short notice (0–3 days)</span>
        <span><span class="ldot" style="background:#378ADD"></span>Long notice (≥4 days)</span>
      </div>
      <div style="position:relative;width:100%;height:220px;"><canvas id="nmc"></canvas></div>
    </div>

    <div class="cbox">
      <div class="ctitle">Handover Success Rate (HSR)</div>
      ${dbasisToggle('db4',hsrBasis)}
      <div style="display:flex;gap:12px;margin-bottom:8px;">
        <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#666;"><span class="ldot" style="background:#4ade80"></span>Success Rate</span>
        <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#333;"><span class="ldot" style="background:rgba(255,255,255,0.12);border:1px dashed rgba(255,255,255,0.2)"></span>Target 70%</span>
      </div>
      <div style="position:relative;width:100%;height:150px;"><canvas id="hsrc"></canvas></div>
    </div>

    <div class="twrap">
      <div class="ptitle" style="margin-bottom:4px">Detail table — monthly + weekly</div>
      <div style="font-size:10px;color:#444;margin-bottom:12px;">Bold = last complete period · KPI deltas: complete ↔ complete only</div>
      <table><thead><tr>
        <th style="text-align:left">Team</th>
        ${MONTHS.map((_,i)=>{const isL=i===LCMI;return `<th class="thm${i===0?' thdiv':''}" style="${isL?'color:#ddd':''}">${ML[i]}</th>`;}).join('')}
        ${WL.map((l,i)=>{const isL=WEEKS[i]===LCW;return `<th class="${i===0?'thdiv':''}" style="${isL?'color:#fff;font-weight:600':'color:#555'}">${l}</th>`;}).join('')}
      </tr></thead><tbody>${trows}${totrow}</tbody></table>
    </div>
    <div class="footer">fact_car_handover_event + fact_clsr_touchpoints · delay_days &gt; 0 · non-silent delays · Updated ${STAND}</div>
  `;

  buildMain(tab);buildReason(tab);buildNotice();buildHSR();
}

window.setTab=function(t){activeTab=t;render();};
if(sessionStorage.getItem('cca')==='1') render();
</script>
</body>
</html>
